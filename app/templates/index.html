<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Easy Food - AI Recipe App</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            🍽️ Easy Food
        </div>

        <div class="nav-links">

            <a href="/home" class="nav-home">
                Home
            </a>

            <a href="/saved" class="nav-saved">
                Saved Recipes
            </a>

            <a href="/favorites" class="nav-favorites">
                Favorites
            </a>

            <a href="/history" class="nav-history">
                History
            </a>

            <a href="/login" class="nav-login">
                Login
            </a>

            <a href="/register" class="nav-register">
                Register
            </a>

            <button
                type="button"
                id="dark-mode-toggle"
                class="dark-toggle">
                🌙
            </button>

            <button
                type="button"
                id="language-toggle"
                class="language-toggle">
                RU
            </button>

        </div>

    </nav>

    <div class="container">

        <h1>
            Easy Food
        </h1>

        <p class="home-description">
            Upload a photo of your ingredients and get meal ideas.
        </p>

        <form
            action="/generate"
            method="POST"
            enctype="multipart/form-data"
        >

            <label class="upload-box">

                <span class="upload-icon">
                    📷
                </span>

                <span id="file-label">
                    Drag & Drop ingredient image here
                </span>

                <br>

                <small>
                    or click to browse files
                </small>

                <input
                    type="file"
                    name="ingredient_image"
                    accept="image/*"
                >

            </label>

            <input
                type="text"
                name="user_preference"
                class="preference-input"
                placeholder="What would you like to eat?"
            >

            <button
                type="submit"
                id="generate-btn">
                Generate Recipes
            </button>

        </form>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
