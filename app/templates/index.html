<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Easy Food - AI Recipe App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Easy Food</h1>
        <p>Upload a photo of your ingredients and get meal ideas.</p>

        <form action="/generate" method="POST" enctype="multipart/form-data">
            <label class="upload-box">
    <span class="upload-icon">📷</span>
    <span id="file-label">Choose ingredient image</span>
    <input type="file" name="ingredient_image" accept="image/*" required>
</label>

<button type="submit" id="generate-btn">Generate Recipes</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
