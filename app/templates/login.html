<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            🍽️ Easy Food
        </div>

        <div class="nav-links">

            <a href="/login" class="nav-login">
                Login
            </a>

            <a href="/register" class="nav-register">
                Register
            </a>

            <button
                type="button"
                id="dark-mode-toggle"
                class="dark-toggle">
                🌙
            </button>

            <button
                type="button"
                id="language-toggle"
                class="language-toggle">
                RU
            </button>

        </div>

    </nav>

    <div class="container auth-container">

        <div class="auth-card">

            <h1 class="auth-title">
                Easy Food
            </h1>

            <p class="auth-subtitle">
                Login to continue using Easy Food
            </p>

            <form id="login-form" class="auth-form">

                <input
                    type="text"
                    id="login-username"
                    class="auth-input"
                    placeholder="Username"
                    minlength="2"
                    required
                >

                <input
                    type="email"
                    id="login-email"
                    class="auth-input"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    id="login-password"
                    class="auth-input"
                    placeholder="Password"
                    minlength="6"
                    required
                >

                <button
                    type="submit"
                    class="auth-btn">
                    Login
                </button>

            </form>

            <p class="auth-switch">

                Don't have an account?

                <a href="/register">
                    Register
                </a>

            </p>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
