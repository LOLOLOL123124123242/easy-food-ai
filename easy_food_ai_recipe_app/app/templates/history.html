<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>History</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            🍽️ Easy Food
        </div>

        <div class="nav-links">

            <a href="/" class="nav-home">
                Home
            </a>

            <a href="/saved" class="nav-saved">
                Saved Recipes
            </a>

            <a href="/favorites" class="nav-favorites">
                Favorites
            </a>

            <a href="/history" class="nav-history">
                History
            </a>

            <button type="button"
                    id="dark-mode-toggle"
                    class="dark-toggle">
                🌙
            </button>

            <button type="button"
                    id="language-toggle"
                    class="language-toggle">
                RU
            </button>

        </div>

    </nav>

    <div class="container">

        <h1 class="history-page-title">
            Recently Viewed
        </h1>

        <div id="recently-viewed-list">

        </div>

        <p id="empty-history">
            No recently viewed recipes.
        </p>

    </div>

    <script>

        const recentlyViewedList =
            document.getElementById("recently-viewed-list");

        const emptyHistory =
            document.getElementById("empty-history");

        const viewedRecipes =
            JSON.parse(
                localStorage.getItem("recentRecipes")
            ) || [];

        if (viewedRecipes.length > 0) {

            emptyHistory.style.display = "none";

            viewedRecipes.forEach(function(recipe) {

                const item =
                    document.createElement("div");

                item.className =
                    "recently-viewed-item";

                item.innerText = recipe;

                recentlyViewedList.appendChild(item);
            });
        }

    </script>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
