<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Favorites</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            🍽️ Easy Food
        </div>

        <div class="nav-links">

            <a href="/" class="nav-home">
                Home
            </a>

            <a href="/saved" class="nav-saved">
                Saved Recipes
            </a>

            <a href="/favorites" class="nav-favorites">
                Favorites
            </a>

            <a href="/history" class="nav-history">
                History
            </a>

            <button type="button"
                    id="dark-mode-toggle"
                    class="dark-toggle">
                🌙
            </button>

            <button type="button"
                    id="language-toggle"
                    class="language-toggle">
                RU
            </button>

        </div>

    </nav>

    <div class="container">

        <h1 class="favorites-page-title">
            Favorite Recipes
        </h1>

        <div id="favorites-container">

        </div>

        <p id="empty-favorites">
            No favorite recipes yet.
        </p>

    </div>

    <script>

        const favoritesContainer =
            document.getElementById("favorites-container");

        const emptyFavorites =
            document.getElementById("empty-favorites");

        let hasFavorites = false;

        for (let i = 0; i < localStorage.length; i++) {

            const key = localStorage.key(i);

            if (key.includes("_title")) {

                hasFavorites = true;

                const baseKey =
                    key.replace("_title", "");

                const recipeTitle =
                    localStorage.getItem(key);

                const recipeTime =
                    localStorage.getItem(baseKey + "_time");

                const recipeDifficulty =
                    localStorage.getItem(baseKey + "_difficulty");

                const card =
                    document.createElement("div");

                card.className = "recipe-card";

                card.innerHTML = `
                    <h3>
                        ❤️ ${recipeTitle}
                    </h3>

                    <p class="favorite-time">
                        Time: ${recipeTime}
                    </p>

                    <p class="favorite-difficulty">
                        Difficulty: ${recipeDifficulty}
                    </p>

                    <button class="remove-favorite-btn">
                        Remove
                    </button>
                `;

                const removeButton =
                    card.querySelector(".remove-favorite-btn");

                removeButton.addEventListener("click", function() {

                    localStorage.removeItem(baseKey);
                    localStorage.removeItem(baseKey + "_title");
                    localStorage.removeItem(baseKey + "_time");
                    localStorage.removeItem(baseKey + "_difficulty");

                    card.remove();

                    if (favoritesContainer.children.length === 0) {
                        emptyFavorites.style.display = "block";
                    }
                });

                favoritesContainer.appendChild(card);
            }
        }

        if (hasFavorites) {
            emptyFavorites.style.display = "none";
        }

    </script>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
